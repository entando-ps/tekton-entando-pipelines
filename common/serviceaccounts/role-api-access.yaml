apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: api-access
  namespace: entando
rules:
  - apiGroups:
      - ""
      - apps
      - autoscaling
      - extentions
      - policy
      - rbac.authorization.k8s.io
      - entando.org
      - security.openshift.io
    resources:
      - pods
      - deployments
      - services
      - entandodebundles
      - securitycontextconstraints
    verbs: ["get", "list", "watch", "create", "update", "patch"]
